<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - LogsPanelSuite</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    body{
      font-family:system-ui,sans-serif;
      background:#ffffff;
    }

    .menu-slide{
      transform:translateX(100%);
      transition:transform .4s ease-in-out;
    }

    .menu-slide.open{
      transform:translateX(0);
    }
  </style>
</head>

<body>
    <!-- HEADER -->

<header class="flex items-center justify-between px-5 py-4 border-b border-gray-200">

  <div class="flex items-center gap-2.5">

    <div class="w-8 h-8 bg-[#6366f1] rounded-full flex items-center justify-center text-lg font-bold text-white">
      L
    </div>

    <span class="text-xl font-semibold">
      LogsPanelSuite
    </span>

  </div>

  <button onclick="toggleMenu()" class="text-3xl">

    <i class="fa-solid fa-bars"></i>

  </button>

</header>
<div id="mobileMenu"
class="menu-slide fixed top-0 right-0 h-full w-80 bg-[#111827] shadow-2xl z-50 p-6 text-white">

<button onclick="toggleMenu()"
class="float-right text-3xl">

<i class="fa-solid fa-xmark"></i>

</button>

<div class="space-y-6 text-lg pt-8">

<a href="index.html"
onclick="loadingRedirect(event,'index.html')"
class="block py-2">

Home

</a>

<a href="register.html"
onclick="loadingRedirect(event,'register.html')"
class="block py-2">

Create Account

</a>

<a href="forgot-password.html"
onclick="loadingRedirect(event,'forgot-password.html')"
class="block py-2">

Forgot Password

</a>

</div>

</div>
<!-- LOGIN SECTION -->

<section class="min-h-screen flex items-center justify-center bg-white px-6 py-16">

  <div class="w-full max-w-md">

    <div class="text-center mb-10">

      <h1 class="text-5xl font-bold text-[#6366f1]">
        Login
      </h1>

      <p class="text-gray-500 mt-3">
        Access your dashboard with your credentials.
      </p>

    </div>

    <!-- Email -->

    <div class="mb-5">

      <label class="block text-gray-700 font-semibold mb-2">
        Email Address
      </label>

      <input
        id="email"
        type="email"
        placeholder="Enter your email"
        class="w-full border border-gray-300 rounded-2xl px-5 py-4 focus:outline-none focus:ring-2 focus:ring-[#6366f1]">

    </div>

    <!-- Password -->

    <div class="mb-3">

      <label class="block text-gray-700 font-semibold mb-2">
        Password
      </label>

      <div class="relative">

        <input
          id="password"
          type="password"
          placeholder="Enter your password"
          class="w-full border border-gray-300 rounded-2xl px-5 py-4 pr-14 focus:outline-none focus:ring-2 focus:ring-[#6366f1]">

        <button
          type="button"
          onclick="togglePassword()"
          class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-500">

          <i id="eyeIcon" class="fa-solid fa-eye"></i>

        </button>

      </div>

    </div>

    <div class="text-right mb-8">

      <a
        href="#"
        onclick="handleForgotPassword()"
        class="text-[#6366f1] font-medium">

        Forgot Password?

      </a>

    </div>

    <!-- Sign In -->

    <button
      onclick="signInUser()"
      class="w-full bg-[#6366f1] hover:bg-[#5558ec] text-white font-semibold py-4 rounded-2xl transition">

      Sign In

    </button>

    <!-- OR -->

    <div class="flex items-center my-8">

      <hr class="flex-1 border-gray-300">

      <span class="px-4 text-gray-400">
        OR
      </span>

      <hr class="flex-1 border-gray-300">

    </div>

    <!-- Google -->

    <button
      onclick="googleLogin()"
      class="w-full border border-gray-300 py-4 rounded-2xl flex items-center justify-center gap-3 hover:bg-gray-50 transition">

      <img
        src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg"
        width="22">

      Continue with Google

    </button>

    <p class="text-center mt-8 text-gray-600">

      New here?

      <a
        href="#"
        onclick="handleRegister()"
        class="text-[#6366f1] font-semibold">

        Create an account

      </a>

    </p>

  </div>

</section>
