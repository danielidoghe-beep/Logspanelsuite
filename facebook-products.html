<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Facebook Products</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
background:#0a1020;
font-family:system-ui,sans-serif;
color:white;
}

</style>

</head>

<body>

<div class="max-w-3xl mx-auto p-5">

<a href="facebook.html"
class="text-blue-400 text-lg">

← Back

</a>

<div class="flex items-center gap-4 mt-6 mb-8">

<i class="fa-brands fa-facebook text-blue-500 text-6xl"></i>

<div>

<h1 class="text-4xl font-bold">

Facebook Accounts

</h1>

<p class="text-gray-400">

Choose an account to purchase.

</p>

</div>

</div>
<div id="products" class="space-y-8">

<p class="text-center text-gray-400 text-xl">

Loading Facebook accounts...

</p>

</div>
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";

import {
getFirestore,
collection,
getDocs
} from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyA53ORM49_ecEyokNloQquC2XfCYwuUFfI",
authDomain: "logspanelsuite.firebaseapp.com",
projectId: "logspanelsuite",
storageBucket: "logspanelsuite.firebasestorage.app",
messagingSenderId: "927578504424",
appId: "1:927578504424:web:bc2d8e9ea4e805ca669d5d"

};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const products = document.getElementById("products");
async function loadProducts() {

products.innerHTML = "";

const snapshot = await getDocs(collection(db,"socialAccounts"));

snapshot.forEach((doc)=>{

const data = doc.data();

if(data.platform !== "Facebook") return;

products.innerHTML += `

<div class="bg-[#111827] rounded-3xl overflow-hidden shadow-xl border border-gray-800">

<img
src="${data.imageUrl}"
class="w-full h-60 object-cover">

<div class="p-6">

<div class="flex items-center gap-3">

<i class="fa-brands fa-facebook text-blue-500 text-4xl"></i>

<h2 class="text-3xl font-bold">

${data.title}

</h2>

</div>

<p class="text-gray-400 mt-4">

${data.description}

</p>

<div class="mt-6 space-y-3">

<div class="flex items-center gap-3">

<i class="fa-solid fa-envelope text-green-400"></i>

<span>Email Included</span>

</div>

<div class="flex items-center gap-3">

<i class="fa-solid fa-lock text-yellow-400"></i>

<span>Password Included</span>

</div>

<div class="flex items-center gap-3">

<i class="fa-solid fa-shield-halved text-blue-400"></i>

<span>2FA Included</span>

</div>

</div>

<div class="flex items-center justify-between mt-8">

<h3 class="text-4xl font-bold text-green-400">

₦${data.price}

</h3>

<button
class="bg-blue-600 hover:bg-blue-500 px-8 py-4 rounded-2xl font-bold">

Buy Now

</button>

</div>

</div>

</div>

`;

});

}

loadProducts();
</body>
</html>
