<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin - Users</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
background:#0a1020;
font-family:system-ui,sans-serif;
color:white;
}

</style>

</head>

<body>

<div class="max-w-6xl mx-auto p-6">

<div class="flex items-center justify-between">

<h1 class="text-4xl font-bold">

Users

</h1>

<a href="admin.html"
class="text-blue-400">

← Dashboard

</a>

</div>

<p class="text-gray-400 mt-2">

Manage registered users.

</p>

<div class="mt-8">

<input
id="searchUser"
type="text"
placeholder="Search user by email..."

class="w-full bg-[#111827] border border-gray-700 rounded-2xl p-4 text-white">

</div>

<div id="usersList" class="space-y-5 mt-8">

<div class="bg-[#111827] rounded-3xl p-6 text-center text-gray-400">

Loading users...

</div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";

import {
getFirestore,
collection,
getDocs,
doc,
updateDoc
} from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyA53ORM49_ecEyokNloQquC2XfCYwuUFfI",
authDomain: "logspanelsuite.firebaseapp.com",
projectId: "logspanelsuite",
storageBucket: "logspanelsuite.firebasestorage.app",
messagingSenderId: "927578504424",
appId: "1:927578504424:web:bc2d8e9ea4e805ca669d5d"

};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const usersList = document.getElementById("usersList");

async function loadUsers(){

usersList.innerHTML = "";

const snapshot = await getDocs(collection(db,"users"));

snapshot.forEach((userDoc)=>{

const user = userDoc.data();

usersList.innerHTML += `

<div class="bg-[#111827] rounded-3xl p-6">

<h2 class="text-2xl font-bold">

${user.email || "No Email"}

</h2>

<p class="text-gray-400 mt-2">

Wallet Balance

</p>

<h3 class="text-3xl font-bold text-green-400 mt-2">

₦${user.balance || 0}

</h3>

<input
id="balance-${userDoc.id}"
type="number"
placeholder="New Balance"

class="w-full bg-[#1f2937] rounded-2xl p-3 mt-5">

<button
onclick="updateBalance('${userDoc.id}')"

class="w-full bg-blue-600 rounded-2xl py-3 mt-4">

Update Balance

</button>

</div>

`;

});

}

window.updateBalance = async(id)=>{

const value = document.getElementById("balance-"+id).value;

await updateDoc(doc(db,"users",id),{

balance:Number(value)

});

alert("Balance Updated");

loadUsers();

}

loadUsers();

</script>

</body>
</html>
