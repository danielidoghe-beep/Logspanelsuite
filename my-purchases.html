<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>My Purchases - LogsPanelSuite</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
background:#090f1f;
font-family:system-ui,sans-serif;
color:white;
}

.purchase-card{
background:#151c2b;
border:1px solid rgba(255,255,255,.08);
border-radius:28px;
padding:22px;
transition:.25s;
}

.purchase-card:hover{
border-color:#f97316;
}

</style>

</head>

<body>

<div class="max-w-md mx-auto px-5 py-6">

<button
onclick="history.back()"
class="flex items-center gap-3 text-orange-500 text-xl font-semibold mb-8">

<i class="fa-solid fa-arrow-left"></i>

Go Back

</button>

<h1 class="text-5xl font-extrabold">

My Purchases

</h1>

<p class="text-gray-400 text-lg mt-3 mb-8">

Everything you've purchased in one place.

</p>

<div
id="purchasesContainer"
class="space-y-5">

<div class="text-center py-20">

<i class="fa-solid fa-bag-shopping text-7xl text-orange-500"></i>

<h2 class="text-3xl font-bold mt-6">

No Purchases Yet

</h2>

<p class="text-gray-400 mt-3">

Once you buy an item, it will appear here.

</p>

</div>

</div>

</div>
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";

import {
getAuth,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";

import {
getFirestore,
collection,
query,
where,
getDocs
} from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

const firebaseConfig = {

apiKey:"AIzaSyA53ORM49_ecEyokNloQquC2XfCYwuUFfI",
authDomain:"logspanelsuite.firebaseapp.com",
projectId:"logspanelsuite",
storageBucket:"logspanelsuite.firebasestorage.app",
messagingSenderId:"927578504424",
appId:"1:927578504424:web:bc2d8e9ea4e805ca669d5d"

};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const purchasesContainer =
document.getElementById("purchasesContainer");

onAuthStateChanged(auth, async(user)=>{

if(!user){

window.location.href="login.html";
return;

}

const q = query(
collection(db,"purchases"),
where("userId","==",user.uid)
);

const snapshot = await getDocs(q);

if(snapshot.empty){

return;

}

purchasesContainer.innerHTML = "";

snapshot.forEach((doc)=>{

const item = doc.data();

purchasesContainer.innerHTML += `

<div class="purchase-card">

<img
src="${item.image}"
class="w-full h-48 object-cover rounded-2xl mb-4">

<h2 class="text-2xl font-bold">

${item.title}

</h2>

<p class="text-gray-400 mt-2">

${item.category}

</p>

<div class="flex justify-between items-center mt-5">

<p class="text-orange-500 font-bold">

₦${Number(item.price).toLocaleString()}

</p>

<span class="text-green-400">

Completed

</span>

</div>

<button
class="w-full mt-5 bg-orange-600 py-3 rounded-2xl font-bold">

View Purchase

</button>

</div>

`;

});

});

</script>

</body>
</html>
